# PIPELINE DEFINITION
# Name: gpon-failure-prediction-pipeline
# Description: End-to-end ML pipeline for predicting GPON router failures within a 7-day horizon.  Stages: ingestion → training → evaluation.
# Inputs:
#    auc_threshold: float [Default: 0.75]
#    input_csv_path: str [Default: 'gs://gpon-telemetry/raw/telemetry.csv']
#    test_size: float [Default: 0.2]
# Outputs:
#    evaluation-component-metrics_artifact: system.Metrics
components:
  comp-evaluation-component:
    executorLabel: exec-evaluation-component
    inputDefinitions:
      artifacts:
        test_data_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        auc_threshold:
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        metrics_artifact:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: BOOLEAN
  comp-ingestion-component:
    executorLabel: exec-ingestion-component
    inputDefinitions:
      parameters:
        input_csv_path:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        processed_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-training-component:
    executorLabel: exec-training-component
    inputDefinitions:
      artifacts:
        processed_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        test_size:
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        test_data_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-evaluation-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluation_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas==2.1.4'\
          \ 'scikit-learn==1.3.2' 'numpy==1.26.2' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluation_component(\n    test_data_artifact: Input[Dataset],\n\
          \    auc_threshold: float,\n    metrics_artifact: Output[Metrics],\n) ->\
          \ bool:\n    \"\"\"Evaluate XGBoost predictions and gate on AUC-ROC threshold.\"\
          \"\"\n    import logging\n    import sys\n\n    import numpy as np\n   \
          \ import pandas as pd\n    from sklearn.metrics import (\n        f1_score,\n\
          \        precision_score,\n        recall_score,\n        roc_auc_score,\n\
          \    )\n\n    logging.basicConfig(\n        level=logging.INFO,\n      \
          \  format=\"%(asctime)s | %(name)s | %(levelname)s | %(message)s\",\n  \
          \      datefmt=\"%Y-%m-%d %H:%M:%S\",\n        handlers=[logging.StreamHandler(sys.stdout)],\n\
          \    )\n    logger = logging.getLogger(\"evaluation_component\")\n\n   \
          \ TARGET_COLUMN = \"Failure_In_7_Days\"\n\n    logger.info(\"Loading test\
          \ data from %s\", test_data_artifact.path)\n    test_df = pd.read_csv(test_data_artifact.path)\n\
          \    logger.info(\"Loaded %d test rows\", len(test_df))\n\n    y_true =\
          \ test_df[TARGET_COLUMN].values\n    y_pred = test_df[\"y_pred\"].values\n\
          \    y_pred_proba = test_df[\"y_pred_proba\"].values\n\n    auc_roc = float(roc_auc_score(y_true,\
          \ y_pred_proba))\n    precision = float(precision_score(y_true, y_pred,\
          \ zero_division=0.0))\n    recall = float(recall_score(y_true, y_pred, zero_division=0.0))\n\
          \    f1 = float(f1_score(y_true, y_pred, zero_division=0.0))\n    positive_rate\
          \ = float(np.mean(y_pred))\n\n    logger.info(\"AUC-ROC   : %.4f\", auc_roc)\n\
          \    logger.info(\"Precision : %.4f\", precision)\n    logger.info(\"Recall\
          \    : %.4f\", recall)\n    logger.info(\"F1 Score  : %.4f\", f1)\n    logger.info(\"\
          Pos. Rate : %.4f\", positive_rate)\n\n    metrics_artifact.log_metric(\"\
          auc_roc\", auc_roc)\n    metrics_artifact.log_metric(\"precision\", precision)\n\
          \    metrics_artifact.log_metric(\"recall\", recall)\n    metrics_artifact.log_metric(\"\
          f1_score\", f1)\n    metrics_artifact.log_metric(\"positive_rate\", positive_rate)\n\
          \    metrics_artifact.log_metric(\"test_row_count\", float(len(test_df)))\n\
          \    metrics_artifact.log_metric(\"auc_threshold\", auc_threshold)\n\n \
          \   passed = auc_roc >= auc_threshold\n    metrics_artifact.log_metric(\"\
          passed_gate\", float(passed))\n\n    if passed:\n        logger.info(\"\
          PASSED: AUC-ROC %.4f >= threshold %.4f\", auc_roc, auc_threshold)\n    else:\n\
          \        logger.warning(\"FAILED: AUC-ROC %.4f < threshold %.4f\", auc_roc,\
          \ auc_threshold)\n\n    return passed\n\n"
        image: python:3.9
    exec-ingestion-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ingestion_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas==2.1.4'\
          \ 'pydantic==2.5.3' 'boto3==1.34.95' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ingestion_component(\n    input_csv_path: str,\n    processed_dataset:\
          \ Output[Dataset],\n) -> None:\n    \"\"\"Ingest and validate raw GPON telemetry\
          \ data.\"\"\"\n    import logging\n    import os\n    import sys\n    import\
          \ tempfile\n    from typing import List\n    from urllib.parse import urlparse\n\
          \n    import boto3\n    import pandas as pd\n    from pydantic import BaseModel,\
          \ Field, ValidationError, field_validator\n\n    logging.basicConfig(\n\
          \        level=logging.INFO,\n        format=\"%(asctime)s | %(name)s |\
          \ %(levelname)s | %(message)s\",\n        datefmt=\"%Y-%m-%d %H:%M:%S\"\
          ,\n        handlers=[logging.StreamHandler(sys.stdout)],\n    )\n    logger\
          \ = logging.getLogger(\"ingestion_component\")\n\n    # ---- Inline validation\
          \ schema ----------------------------------------\n\n    class TelemetryRecord(BaseModel):\n\
          \        Optical_RX_Power_dBm: float = Field(..., ge=-40.0, le=0.0)\n  \
          \      Optical_TX_Power_dBm: float = Field(..., ge=-10.0, le=10.0)\n   \
          \     Temperature_C: float = Field(..., ge=-40.0, le=125.0)\n        Voltage_mV:\
          \ float = Field(..., ge=0.0, le=5000.0)\n        Bias_Current_mA: float\
          \ = Field(..., ge=0.0, le=200.0)\n        Interface_Error_Count: int = Field(...,\
          \ ge=0)\n        Reboot_Count_Last_7D: int = Field(..., ge=0)\n        Connected_Devices:\
          \ int = Field(..., ge=0)\n        Device_Age_Days: int = Field(..., ge=0)\n\
          \        Maintenance_Count_Last_30D: int = Field(..., ge=0)\n        Failure_In_7_Days:\
          \ int = Field(..., ge=0, le=1)\n\n        @field_validator(\"Failure_In_7_Days\"\
          )\n        @classmethod\n        def validate_binary_target(cls, v: int)\
          \ -> int:\n            if v not in (0, 1):\n                raise ValueError(\"\
          Failure_In_7_Days must be 0 or 1\")\n            return v\n\n    # ----\
          \ Inline feature engineering --------------------------------------\n\n\
          \    def normalize_voltage(df: pd.DataFrame) -> pd.DataFrame:\n        df\
          \ = df.copy()\n        df[\"Voltage_V\"] = df[\"Voltage_mV\"] / 1000.0\n\
          \        df = df.drop(columns=[\"Voltage_mV\"])\n        return df\n\n \
          \   def compute_rx_power_rolling_features(\n        df: pd.DataFrame,\n\
          \        window: str = \"24h\",\n        timestamp_col: str = \"timestamp\"\
          ,\n    ) -> pd.DataFrame:\n        df = df.copy()\n        df[timestamp_col]\
          \ = pd.to_datetime(df[timestamp_col])\n        df = df.sort_values(timestamp_col).set_index(timestamp_col)\n\
          \        rolling = df[\"Optical_RX_Power_dBm\"].rolling(window=window, min_periods=1)\n\
          \        df[\"RX_Power_Rolling_Mean_dBm\"] = rolling.mean()\n        df[\"\
          RX_Power_Rolling_Std_dBm\"] = rolling.std().fillna(0.0)\n        df = df.reset_index()\n\
          \        return df\n\n    # ---- Load CSV via boto3 (handles s3:// paths\
          \ through MinIO) ----------\n\n    logger.info(\"Loading raw CSV from %s\"\
          , input_csv_path)\n\n    parsed = urlparse(input_csv_path)\n    if parsed.scheme\
          \ == \"s3\":\n        s3_endpoint = os.environ.get(\n            \"MLFLOW_S3_ENDPOINT_URL\"\
          ,\n            \"http://mlflow-minio.mlops.svc.cluster.local:9000\",\n \
          \       )\n        aws_key = os.environ.get(\"AWS_ACCESS_KEY_ID\", \"minio\"\
          )\n        aws_secret = os.environ.get(\"AWS_SECRET_ACCESS_KEY\", \"minio123\"\
          )\n\n        logger.info(\"Connecting to MinIO at %s\", s3_endpoint)\n \
          \       s3_client = boto3.client(\n            \"s3\",\n            endpoint_url=s3_endpoint,\n\
          \            aws_access_key_id=aws_key,\n            aws_secret_access_key=aws_secret,\n\
          \        )\n        bucket = parsed.netloc\n        key = parsed.path.lstrip(\"\
          /\")\n\n        tmp_file = tempfile.NamedTemporaryFile(suffix=\".csv\",\
          \ delete=False)\n        tmp_path = tmp_file.name\n        tmp_file.close()\n\
          \n        logger.info(\"Downloading s3://%s/%s \u2192 %s\", bucket, key,\
          \ tmp_path)\n        s3_client.download_file(bucket, key, tmp_path)\n  \
          \      raw_df = pd.read_csv(tmp_path)\n        os.unlink(tmp_path)\n   \
          \ else:\n        raw_df = pd.read_csv(input_csv_path)\n\n    logger.info(\"\
          Loaded %d rows, %d columns\", len(raw_df), len(raw_df.columns))\n\n    #\
          \ ---- Validate --------------------------------------------------------\n\
          \n    valid_rows: List[dict] = []\n    invalid_indices: List[int] = []\n\
          \n    for idx, row in raw_df.iterrows():\n        try:\n            record\
          \ = TelemetryRecord(**row.to_dict())\n            valid_rows.append(record.model_dump())\n\
          \        except ValidationError as exc:\n            invalid_indices.append(int(idx))\n\
          \            logger.warning(\"Row %d failed validation: %s errors\", idx,\
          \ exc.error_count())\n\n    valid_df = pd.DataFrame(valid_rows)\n    logger.info(\n\
          \        \"Validation: %d valid, %d invalid out of %d total\",\n       \
          \ len(valid_rows), len(invalid_indices), len(raw_df),\n    )\n\n    if valid_df.empty:\n\
          \        raise RuntimeError(\"No valid records after validation. Aborting.\"\
          )\n\n    # ---- Feature engineering ---------------------------------------------\n\
          \n    valid_df = normalize_voltage(valid_df)\n    logger.info(\"Voltage\
          \ normalised (mV -> V)\")\n\n    if \"timestamp\" in valid_df.columns:\n\
          \        valid_df = compute_rx_power_rolling_features(valid_df)\n      \
          \  logger.info(\"Rolling RX power features computed (24 h window)\")\n\n\
          \    # ---- Persist artifact ------------------------------------------------\n\
          \n    valid_df.to_csv(processed_dataset.path, index=False)\n    processed_dataset.metadata[\"\
          row_count\"] = len(valid_df)\n    processed_dataset.metadata[\"column_count\"\
          ] = len(valid_df.columns)\n    processed_dataset.metadata[\"invalid_row_count\"\
          ] = len(invalid_indices)\n    logger.info(\"Processed dataset written to\
          \ %s\", processed_dataset.path)\n\n"
        image: python:3.9
    exec-training-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - training_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas==2.1.4'\
          \ 'xgboost==2.0.3' 'scikit-learn==1.3.2' 'numpy==1.26.2' && \"$0\" \"$@\"\
          \n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef training_component(\n    processed_dataset: Input[Dataset],\n\
          \    test_size: float,\n    model_artifact: Output[Model],\n    test_data_artifact:\
          \ Output[Dataset],\n) -> None:\n    \"\"\"Train an XGBoost classifier on\
          \ processed GPON telemetry data.\"\"\"\n    import json\n    import logging\n\
          \    import sys\n    from pathlib import Path\n    from typing import Dict,\
          \ List\n\n    import numpy as np\n    import pandas as pd\n    import xgboost\
          \ as xgb\n\n    logging.basicConfig(\n        level=logging.INFO,\n    \
          \    format=\"%(asctime)s | %(name)s | %(levelname)s | %(message)s\",\n\
          \        datefmt=\"%Y-%m-%d %H:%M:%S\",\n        handlers=[logging.StreamHandler(sys.stdout)],\n\
          \    )\n    logger = logging.getLogger(\"training_component\")\n\n    TARGET_COLUMN\
          \ = \"Failure_In_7_Days\"\n    NON_FEATURE_COLUMNS = [TARGET_COLUMN, \"\
          timestamp\"]\n\n    DEFAULT_XGB_PARAMS: Dict[str, object] = {\n        \"\
          objective\": \"binary:logistic\",\n        \"eval_metric\": \"auc\",\n \
          \       \"max_depth\": 6,\n        \"learning_rate\": 0.1,\n        \"n_estimators\"\
          : 200,\n        \"subsample\": 0.8,\n        \"colsample_bytree\": 0.8,\n\
          \        \"scale_pos_weight\": 1.0,\n        \"random_state\": 42,\n   \
          \     \"use_label_encoder\": False,\n    }\n\n    logger.info(\"Loading\
          \ processed dataset from %s\", processed_dataset.path)\n    df = pd.read_csv(processed_dataset.path)\n\
          \    logger.info(\"Loaded %d rows, %d columns\", len(df), len(df.columns))\n\
          \n    if \"timestamp\" in df.columns:\n        df[\"timestamp\"] = pd.to_datetime(df[\"\
          timestamp\"])\n        df = df.sort_values(\"timestamp\").reset_index(drop=True)\n\
          \n    split_idx = int(len(df) * (1.0 - test_size))\n    train_df = df.iloc[:split_idx].reset_index(drop=True)\n\
          \    test_df = df.iloc[split_idx:].reset_index(drop=True)\n    logger.info(\"\
          Split: %d train, %d test\", len(train_df), len(test_df))\n\n    drop_cols\
          \ = [c for c in NON_FEATURE_COLUMNS if c in train_df.columns]\n    X_train\
          \ = train_df.drop(columns=drop_cols)\n    y_train = train_df[TARGET_COLUMN]\n\
          \    X_test = test_df.drop(columns=drop_cols)\n    y_test = test_df[TARGET_COLUMN]\n\
          \    feature_names: List[str] = list(X_train.columns)\n    logger.info(\"\
          Features (%d): %s\", len(feature_names), feature_names)\n\n    logger.info(\"\
          Training XGBoost with params: %s\", DEFAULT_XGB_PARAMS)\n    model = xgb.XGBClassifier(**DEFAULT_XGB_PARAMS)\n\
          \    model.fit(X_train, y_train, verbose=False)\n    logger.info(\"Training\
          \ complete\")\n\n    y_pred = model.predict(X_test)\n    y_pred_proba =\
          \ model.predict_proba(X_test)[:, 1]\n    logger.info(\"Positive prediction\
          \ rate: %.4f\", float(np.mean(y_pred)))\n\n    model_path = Path(model_artifact.path)\n\
          \    model_path.parent.mkdir(parents=True, exist_ok=True)\n    model.save_model(str(model_path))\n\
          \    model_artifact.metadata[\"framework\"] = \"xgboost\"\n    model_artifact.metadata[\"\
          feature_names\"] = json.dumps(feature_names)\n    logger.info(\"Model saved\
          \ to %s\", model_path)\n\n    test_output = test_df.copy()\n    test_output[\"\
          y_pred\"] = y_pred\n    test_output[\"y_pred_proba\"] = y_pred_proba\n \
          \   test_output.to_csv(test_data_artifact.path, index=False)\n    test_data_artifact.metadata[\"\
          test_row_count\"] = len(test_output)\n    logger.info(\"Test data with predictions\
          \ written to %s\", test_data_artifact.path)\n\n"
        image: python:3.9
pipelineInfo:
  description: "End-to-end ML pipeline for predicting GPON router failures within\
    \ a 7-day horizon.  Stages: ingestion \u2192 training \u2192 evaluation."
  name: gpon-failure-prediction-pipeline
root:
  dag:
    outputs:
      artifacts:
        evaluation-component-metrics_artifact:
          artifactSelectors:
          - outputArtifactKey: metrics_artifact
            producerSubtask: evaluation-component
    tasks:
      evaluation-component:
        cachingOptions: {}
        componentRef:
          name: comp-evaluation-component
        dependentTasks:
        - training-component
        inputs:
          artifacts:
            test_data_artifact:
              taskOutputArtifact:
                outputArtifactKey: test_data_artifact
                producerTask: training-component
          parameters:
            auc_threshold:
              componentInputParameter: auc_threshold
        taskInfo:
          name: Evaluate Model & Quality Gate
      ingestion-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-ingestion-component
        inputs:
          parameters:
            input_csv_path:
              componentInputParameter: input_csv_path
        taskInfo:
          name: Ingest & Validate Telemetry
      training-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-training-component
        dependentTasks:
        - ingestion-component
        inputs:
          artifacts:
            processed_dataset:
              taskOutputArtifact:
                outputArtifactKey: processed_dataset
                producerTask: ingestion-component
          parameters:
            test_size:
              componentInputParameter: test_size
        taskInfo:
          name: Train XGBoost Classifier
  inputDefinitions:
    parameters:
      auc_threshold:
        defaultValue: 0.75
        description: 'Minimum AUC-ROC score the trained model must

          achieve for the evaluation gate to pass.  Defaults to ``0.75``.'
        isOptional: true
        parameterType: NUMBER_DOUBLE
      input_csv_path:
        defaultValue: gs://gpon-telemetry/raw/telemetry.csv
        description: 'Cloud Storage or local path to the raw telemetry

          CSV file.  Defaults to ``gs://gpon-telemetry/raw/telemetry.csv``.'
        isOptional: true
        parameterType: STRING
      test_size:
        defaultValue: 0.2
        description: 'Fraction of data reserved for the chronological test

          split.  Must be in the open interval (0, 1).  Defaults to ``0.2``.'
        isOptional: true
        parameterType: NUMBER_DOUBLE
  outputDefinitions:
    artifacts:
      evaluation-component-metrics_artifact:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
schemaVersion: 2.1.0
sdkVersion: kfp-2.7.0
