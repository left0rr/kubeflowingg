# PIPELINE DEFINITION
# Name: gpon-failure-prediction-pipeline
# Description: End-to-end ML pipeline for predicting GPON router failures within a 7-day horizon. Stages: ingestion → training → evaluation → MLflow registration.
# Inputs:
#    auc_threshold: float [Default: 0.75]
#    experiment_name: str [Default: 'gpon-failure-prediction']
#    input_csv_path: str [Default: 's3://gpon-telemetry/raw/telemetry.csv']
#    model_name: str [Default: 'gpon-xgboost-classifier']
#    test_size: float [Default: 0.2]
# Outputs:
#    evaluation-component-metrics_artifact: system.Metrics
components:
  comp-condition-1:
    dag:
      tasks:
        registration-component:
          cachingOptions: {}
          componentRef:
            name: comp-registration-component
          inputs:
            artifacts:
              model_artifact:
                componentInputArtifact: pipelinechannel--training-component-model_artifact
              test_data_artifact:
                componentInputArtifact: pipelinechannel--training-component-test_data_artifact
            parameters:
              experiment_name:
                componentInputParameter: pipelinechannel--experiment_name
              model_name:
                componentInputParameter: pipelinechannel--model_name
          taskInfo:
            name: Register Model in MLflow
    inputDefinitions:
      artifacts:
        pipelinechannel--training-component-model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        pipelinechannel--training-component-test_data_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--evaluation-component-Output:
          parameterType: BOOLEAN
        pipelinechannel--experiment_name:
          parameterType: STRING
        pipelinechannel--model_name:
          parameterType: STRING
  comp-evaluation-component:
    executorLabel: exec-evaluation-component
    inputDefinitions:
      artifacts:
        test_data_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        auc_threshold:
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        metrics_artifact:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: BOOLEAN
  comp-ingestion-component:
    executorLabel: exec-ingestion-component
    inputDefinitions:
      parameters:
        input_csv_path:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        processed_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-registration-component:
    executorLabel: exec-registration-component
    inputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        test_data_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        experiment_name:
          parameterType: STRING
        model_name:
          parameterType: STRING
  comp-training-component:
    executorLabel: exec-training-component
    inputDefinitions:
      artifacts:
        processed_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        test_size:
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        test_data_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-evaluation-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluation_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluation_component(\n    test_data_artifact: Input[Dataset],\n\
          \    auc_threshold: float,\n    metrics_artifact: Output[Metrics],\n) ->\
          \ bool:\n    \"\"\"Evaluate predictions by reusing the shared metric functions\
          \ in ``src``.\"\"\"\n    import logging\n\n    import numpy as np\n    import\
          \ pandas as pd\n\n    from src.training.evaluate import (\n        calculate_auc,\n\
          \        calculate_f1,\n        calculate_precision,\n        calculate_recall,\n\
          \    )\n\n    logging.basicConfig(\n        level=logging.INFO,\n      \
          \  format=\"%(asctime)s | %(name)s | %(levelname)s | %(message)s\",\n  \
          \      datefmt=\"%Y-%m-%d %H:%M:%S\",\n    )\n    logger = logging.getLogger(\"\
          evaluation_component\")\n\n    target_column = \"Failure_In_7_Days\"\n \
          \   test_df = pd.read_csv(test_data_artifact.path)\n    logger.info(\"Loaded\
          \ %d test rows from %s\", len(test_df), test_data_artifact.path)\n\n   \
          \ y_true = test_df[target_column].values\n    y_pred = test_df[\"y_pred\"\
          ].values\n    y_pred_proba = test_df[\"y_pred_proba\"].values\n\n    auc_roc\
          \ = calculate_auc(y_true, y_pred_proba)\n    precision = calculate_precision(y_true,\
          \ y_pred)\n    recall = calculate_recall(y_true, y_pred)\n    f1 = calculate_f1(y_true,\
          \ y_pred)\n    positive_rate = float(np.mean(y_pred))\n\n    logger.info(\"\
          AUC-ROC   : %.4f\", auc_roc)\n    logger.info(\"Precision : %.4f\", precision)\n\
          \    logger.info(\"Recall    : %.4f\", recall)\n    logger.info(\"F1 Score\
          \  : %.4f\", f1)\n    logger.info(\"Pos. Rate : %.4f\", positive_rate)\n\
          \n    metrics_artifact.log_metric(\"auc_roc\", auc_roc)\n    metrics_artifact.log_metric(\"\
          precision\", precision)\n    metrics_artifact.log_metric(\"recall\", recall)\n\
          \    metrics_artifact.log_metric(\"f1_score\", f1)\n    metrics_artifact.log_metric(\"\
          positive_rate\", positive_rate)\n    metrics_artifact.log_metric(\"test_row_count\"\
          , float(len(test_df)))\n    metrics_artifact.log_metric(\"auc_threshold\"\
          , auc_threshold)\n\n    passed = auc_roc >= auc_threshold\n    metrics_artifact.log_metric(\"\
          passed_gate\", float(passed))\n\n    if not passed:\n        raise RuntimeError(\n\
          \            \"Quality gate failed: \"\n            f\"auc_roc={auc_roc:.4f}\
          \ < threshold={auc_threshold:.4f}\"\n        )\n\n    logger.info(\"PASSED:\
          \ AUC-ROC %.4f >= threshold %.4f\", auc_roc, auc_threshold)\n    return\
          \ True\n\n"
        image: kfp-base:latest
    exec-ingestion-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ingestion_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ingestion_component(\n    input_csv_path: str,\n    processed_dataset:\
          \ Output[Dataset],\n) -> None:\n    \"\"\"Ingest raw telemetry by reusing\
          \ the ``src.data.ingest`` workflow.\"\"\"\n    import logging\n    import\
          \ os\n    from pathlib import Path\n    import tempfile\n    from typing\
          \ import Optional\n    from urllib.parse import urlparse\n\n    import boto3\n\
          \    from botocore.config import Config\n\n    from src.data.ingest import\
          \ (\n        apply_feature_engineering,\n        configure_logging,\n  \
          \      load_csv,\n        save_processed,\n        validate_records,\n \
          \   )\n\n    configure_logging()\n    logger = logging.getLogger(\"ingestion_component\"\
          )\n\n    parsed = urlparse(input_csv_path)\n    temp_input_path: Optional[Path]\
          \ = None\n\n    if parsed.scheme == \"s3\":\n        s3_endpoint = os.environ.get(\"\
          MLFLOW_S3_ENDPOINT_URL\")\n        s3_client = boto3.client(\n         \
          \   \"s3\",\n            endpoint_url=s3_endpoint,\n            aws_access_key_id=os.environ.get(\"\
          AWS_ACCESS_KEY_ID\", \"minio\"),\n            aws_secret_access_key=os.environ.get(\"\
          AWS_SECRET_ACCESS_KEY\", \"minio123\"),\n            region_name=\"us-east-1\"\
          ,\n            config=Config(signature_version=\"s3v4\"),\n        )\n \
          \       bucket = parsed.netloc\n        key = parsed.path.lstrip(\"/\")\n\
          \        with tempfile.NamedTemporaryFile(suffix=\".csv\", delete=False)\
          \ as tmp:\n            temp_input_path = Path(tmp.name)\n        s3_client.download_file(bucket,\
          \ key, str(temp_input_path))\n        logger.info(\"Downloaded s3://%s/%s\
          \ to %s\", bucket, key, temp_input_path)\n        local_input_path = temp_input_path\n\
          \    else:\n        local_input_path = Path(input_csv_path)\n\n    try:\n\
          \        raw_df = load_csv(local_input_path)\n        valid_df, invalid_indices\
          \ = validate_records(raw_df)\n\n        if valid_df.empty:\n           \
          \ raise RuntimeError(\"No valid records after validation. Aborting.\")\n\
          \n        processed_df = apply_feature_engineering(valid_df)\n        save_processed(processed_df,\
          \ output_path=Path(processed_dataset.path))\n\n        processed_dataset.metadata[\"\
          row_count\"] = len(processed_df)\n        processed_dataset.metadata[\"\
          column_count\"] = len(processed_df.columns)\n        processed_dataset.metadata[\"\
          invalid_row_count\"] = len(invalid_indices)\n        logger.info(\"Processed\
          \ dataset written to %s\", processed_dataset.path)\n    finally:\n     \
          \   if temp_input_path is not None and temp_input_path.exists():\n     \
          \       temp_input_path.unlink()\n\n"
        image: kfp-base:latest
    exec-registration-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - registration_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef registration_component(\n    model_artifact: Input[Model],\n\
          \    test_data_artifact: Input[Dataset],\n    experiment_name: str,\n  \
          \  model_name: str,\n) -> None:\n    \"\"\"Register the trained model by\
          \ reusing the shared MLflow helper functions.\"\"\"\n    import json\n \
          \   import logging\n    import os\n\n    import mlflow\n    import pandas\
          \ as pd\n    import xgboost as xgb\n\n    from src.training.evaluate import\
          \ (\n        calculate_auc,\n        calculate_f1,\n        calculate_precision,\n\
          \        calculate_recall,\n    )\n    from src.training.register_model\
          \ import (\n        configure_logging,\n        generate_feature_importance_plot,\n\
          \        log_metrics_to_mlflow,\n        register_model_in_registry,\n \
          \   )\n\n    configure_logging()\n    logger = logging.getLogger(\"registration_component\"\
          )\n\n    mlflow_tracking_uri = os.environ[\"MLFLOW_TRACKING_URI\"]\n   \
          \ mlflow.set_tracking_uri(mlflow_tracking_uri)\n    mlflow.set_experiment(experiment_name)\n\
          \    logger.info(\"MLflow tracking URI : %s\", mlflow_tracking_uri)\n  \
          \  logger.info(\"MLflow experiment   : %s\", experiment_name)\n\n    model\
          \ = xgb.XGBClassifier()\n    model.load_model(model_artifact.path)\n   \
          \ feature_names = json.loads(model_artifact.metadata.get(\"feature_names\"\
          , \"[]\"))\n    logger.info(\"Model loaded from %s\", model_artifact.path)\n\
          \n    test_df = pd.read_csv(test_data_artifact.path)\n    y_true = test_df[\"\
          Failure_In_7_Days\"].values\n    y_pred = test_df[\"y_pred\"].values\n \
          \   y_pred_proba = test_df[\"y_pred_proba\"].values\n\n    metrics = {\n\
          \        \"test_auc_roc\": calculate_auc(y_true, y_pred_proba),\n      \
          \  \"test_precision\": calculate_precision(y_true, y_pred),\n        \"\
          test_recall\": calculate_recall(y_true, y_pred),\n        \"test_f1\": calculate_f1(y_true,\
          \ y_pred),\n        \"test_positive_rate\": float(y_pred.mean()),\n    \
          \    \"test_size\": float(len(test_df)),\n    }\n    for name, value in\
          \ metrics.items():\n        logger.info(\"Metric %-20s : %.4f\", name, value)\n\
          \n    plot_path = generate_feature_importance_plot(model, feature_names)\n\
          \n    with mlflow.start_run(run_name=\"kfp-xgboost-gpon-failure\") as run:\n\
          \        logger.info(\"MLflow run ID: %s\", run.info.run_id)\n        log_metrics_to_mlflow(metrics)\n\
          \        mlflow.log_param(\"feature_count\", len(feature_names))\n     \
          \   mlflow.log_param(\"feature_names\", str(feature_names))\n        mlflow.log_param(\"\
          source\", \"kubeflow-pipeline\")\n        mlflow.log_artifact(plot_path,\
          \ artifact_path=\"plots\")\n        register_model_in_registry(model=model,\
          \ model_name=model_name)\n\n        logger.info(\"Model registered in MLflow\
          \ as '%s'\", model_name)\n        logger.info(\"AUC-ROC : %.4f\", metrics[\"\
          test_auc_roc\"])\n        logger.info(\"F1 Score: %.4f\", metrics[\"test_f1\"\
          ])\n\n"
        image: kfp-base:latest
    exec-training-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - training_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef training_component(\n    processed_dataset: Input[Dataset],\n\
          \    test_size: float,\n    model_artifact: Output[Model],\n    test_data_artifact:\
          \ Output[Dataset],\n) -> None:\n    \"\"\"Train the model by reusing the\
          \ ``src.training.train_xgboost`` workflow.\"\"\"\n    import json\n    import\
          \ logging\n    from pathlib import Path\n\n    from src.training.train_xgboost\
          \ import (\n        chronological_train_test_split,\n        configure_logging,\n\
          \        generate_predictions,\n        load_processed_dataset,\n      \
          \  prepare_features_and_target,\n        train_xgboost,\n    )\n\n    configure_logging()\n\
          \    logger = logging.getLogger(\"training_component\")\n\n    df = load_processed_dataset(Path(processed_dataset.path))\n\
          \    train_df, test_df = chronological_train_test_split(df, test_size=test_size)\n\
          \n    X_train, y_train, feature_names = prepare_features_and_target(train_df)\n\
          \    X_test, _, _ = prepare_features_and_target(test_df)\n\n    model =\
          \ train_xgboost(X_train, y_train)\n    y_pred, y_pred_proba = generate_predictions(model,\
          \ X_test)\n\n    model_path = Path(model_artifact.path)\n    model_path.parent.mkdir(parents=True,\
          \ exist_ok=True)\n    model.save_model(str(model_path))\n    model_artifact.metadata[\"\
          framework\"] = \"xgboost\"\n    model_artifact.metadata[\"feature_names\"\
          ] = json.dumps(feature_names)\n    logger.info(\"Model saved to %s\", model_path)\n\
          \n    test_output = test_df.copy()\n    test_output[\"y_pred\"] = y_pred\n\
          \    test_output[\"y_pred_proba\"] = y_pred_proba\n    test_output.to_csv(test_data_artifact.path,\
          \ index=False)\n    test_data_artifact.metadata[\"test_row_count\"] = len(test_output)\n\
          \    logger.info(\"Test data with predictions written to %s\", test_data_artifact.path)\n\
          \n"
        image: kfp-base:latest
pipelineInfo:
  description: "End-to-end ML pipeline for predicting GPON router failures within\
    \ a 7-day horizon. Stages: ingestion \u2192 training \u2192 evaluation \u2192\
    \ MLflow registration."
  name: gpon-failure-prediction-pipeline
root:
  dag:
    outputs:
      artifacts:
        evaluation-component-metrics_artifact:
          artifactSelectors:
          - outputArtifactKey: metrics_artifact
            producerSubtask: evaluation-component
    tasks:
      condition-1:
        componentRef:
          name: comp-condition-1
        dependentTasks:
        - evaluation-component
        - training-component
        inputs:
          artifacts:
            pipelinechannel--training-component-model_artifact:
              taskOutputArtifact:
                outputArtifactKey: model_artifact
                producerTask: training-component
            pipelinechannel--training-component-test_data_artifact:
              taskOutputArtifact:
                outputArtifactKey: test_data_artifact
                producerTask: training-component
          parameters:
            pipelinechannel--evaluation-component-Output:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: evaluation-component
            pipelinechannel--experiment_name:
              componentInputParameter: experiment_name
            pipelinechannel--model_name:
              componentInputParameter: model_name
        taskInfo:
          name: register-if-quality-gate-passed
        triggerPolicy:
          condition: inputs.parameter_values['pipelinechannel--evaluation-component-Output']
            == true
      evaluation-component:
        cachingOptions: {}
        componentRef:
          name: comp-evaluation-component
        dependentTasks:
        - training-component
        inputs:
          artifacts:
            test_data_artifact:
              taskOutputArtifact:
                outputArtifactKey: test_data_artifact
                producerTask: training-component
          parameters:
            auc_threshold:
              componentInputParameter: auc_threshold
        taskInfo:
          name: Evaluate Model & Quality Gate
      ingestion-component:
        cachingOptions: {}
        componentRef:
          name: comp-ingestion-component
        inputs:
          parameters:
            input_csv_path:
              componentInputParameter: input_csv_path
        taskInfo:
          name: Ingest & Validate Telemetry
      training-component:
        cachingOptions: {}
        componentRef:
          name: comp-training-component
        dependentTasks:
        - ingestion-component
        inputs:
          artifacts:
            processed_dataset:
              taskOutputArtifact:
                outputArtifactKey: processed_dataset
                producerTask: ingestion-component
          parameters:
            test_size:
              componentInputParameter: test_size
        taskInfo:
          name: Train XGBoost Classifier
  inputDefinitions:
    parameters:
      auc_threshold:
        defaultValue: 0.75
        description: Minimum AUC-ROC to pass the quality gate.
        isOptional: true
        parameterType: NUMBER_DOUBLE
      experiment_name:
        defaultValue: gpon-failure-prediction
        description: MLflow experiment name.
        isOptional: true
        parameterType: STRING
      input_csv_path:
        defaultValue: s3://gpon-telemetry/raw/telemetry.csv
        description: S3/MinIO path to the raw telemetry CSV.
        isOptional: true
        parameterType: STRING
      model_name:
        defaultValue: gpon-xgboost-classifier
        description: MLflow Model Registry name.
        isOptional: true
        parameterType: STRING
      test_size:
        defaultValue: 0.2
        description: Fraction of data reserved for testing (0-1).
        isOptional: true
        parameterType: NUMBER_DOUBLE
  outputDefinitions:
    artifacts:
      evaluation-component-metrics_artifact:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
schemaVersion: 2.1.0
sdkVersion: kfp-2.7.0
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-evaluation-component:
          configMapAsEnv:
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: MLFLOW_TRACKING_URI
              envVar: MLFLOW_TRACKING_URI
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: MLFLOW_S3_ENDPOINT_URL
              envVar: MLFLOW_S3_ENDPOINT_URL
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: AWS_ACCESS_KEY_ID
              envVar: AWS_ACCESS_KEY_ID
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: AWS_SECRET_ACCESS_KEY
              envVar: AWS_SECRET_ACCESS_KEY
          imagePullPolicy: Never
        exec-ingestion-component:
          configMapAsEnv:
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: MLFLOW_TRACKING_URI
              envVar: MLFLOW_TRACKING_URI
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: MLFLOW_S3_ENDPOINT_URL
              envVar: MLFLOW_S3_ENDPOINT_URL
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: AWS_ACCESS_KEY_ID
              envVar: AWS_ACCESS_KEY_ID
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: AWS_SECRET_ACCESS_KEY
              envVar: AWS_SECRET_ACCESS_KEY
          imagePullPolicy: Never
        exec-registration-component:
          configMapAsEnv:
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: MLFLOW_TRACKING_URI
              envVar: MLFLOW_TRACKING_URI
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: MLFLOW_S3_ENDPOINT_URL
              envVar: MLFLOW_S3_ENDPOINT_URL
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: AWS_ACCESS_KEY_ID
              envVar: AWS_ACCESS_KEY_ID
          - configMapName: mlops-endpoints
            keyToEnv:
            - configMapKey: AWS_SECRET_ACCESS_KEY
              envVar: AWS_SECRET_ACCESS_KEY
          imagePullPolicy: Never
        exec-training-component:
          configMapAsEnv:
