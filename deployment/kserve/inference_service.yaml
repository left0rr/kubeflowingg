apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: gpon-failure-predictor
  namespace: kserve
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    containers:
      - name: kserve-container
        image: kserve/xgbserver:latest
        imagePullPolicy: Never
        args:
          - --model_name=gpon-failure-predictor
          - --model_dir=/mnt/models
          - --http_port=8080
          - --nthread=1
        ports:
          - containerPort: 8080
            protocol: TCP
        readinessProbe:
          httpGet:
            path: /v1/models/gpon-failure-predictor
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
          failureThreshold: 20
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
          - name: model-dir
            mountPath: /mnt/models
      - name: model-downloader
        image: amazon/aws-cli:latest
        imagePullPolicy: Never
        command:
          - /bin/sh
          - -c
          - |
            mkdir -p /mnt/models/gpon-failure-predictor &&
            aws --endpoint-url "${MINIO_ENDPOINT_URL}" s3 cp \
              s3://deployment-models/gpon-failure-predictor/champion/model.bst \
              /mnt/models/gpon-failure-predictor/model.bst &&
            echo "Model downloaded successfully" &&
            tail -f /dev/null
        env:
          - name: MINIO_ENDPOINT_URL
            valueFrom:
              configMapKeyRef:
                name: mlops-endpoints
                key: MINIO_ENDPOINT_URL
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              configMapKeyRef:
                name: mlops-endpoints
                key: AWS_ACCESS_KEY_ID
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              configMapKeyRef:
                name: mlops-endpoints
                key: AWS_SECRET_ACCESS_KEY
          - name: AWS_DEFAULT_REGION
            value: "us-east-1"
        volumeMounts:
          - name: model-dir
            mountPath: /mnt/models
    volumes:
      - name: model-dir
        emptyDir: {}
